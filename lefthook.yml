pre-commit:
  parallel: false
  commands:
    biome:
      glob: "*.{ts,js,json}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files} && bunx biome lint --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: bun run typecheck
    colocated-tests:
      glob: "*.test.ts"
      run: |
        for f in {staged_files}; do
          dir=$(dirname "$f")
          # A test file is orphaned if its directory contains NO non-test .ts source files.
          # This allows foo-extra.test.ts alongside foo.ts, and arch.test.ts at a package root.
          sources=$(find "$dir" -maxdepth 1 -name "*.ts" ! -name "*.test.ts" ! -name "*.d.ts" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$sources" -eq 0 ]; then
            echo "❌ Orphaned test (no source files in same directory): $f"
            exit 1
          fi
        done
    line-limit:
      run: |
        violations=$(find extensions skills -name "*.ts" ! -name "*.test.ts" | xargs wc -l 2>/dev/null | awk '$1 > 200 && $2 != "total"' | grep -v "node_modules" || true)
        if [ -n "$violations" ]; then
          echo "❌ Files exceeding 200 lines (split them — Basic_knowledge.md §Single Responsibility):"
          echo "$violations"
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun test extensions/
    audit:
      run: bun audit || true
