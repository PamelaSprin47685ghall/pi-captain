<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Evalset Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --yellow: #a07830;
      --yellow-bg: #fdf6e3;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lora', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .header {
      background: var(--header-bg); color: var(--header-text);
      padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .header h1 { font-family: 'Poppins', sans-serif; font-size: 1.2rem; font-weight: 600; }
    .header .subtitle { font-size: 0.75rem; opacity: 0.6; margin-top: 0.2rem; }
    .header .save-btn {
      font-family: 'Poppins', sans-serif; padding: 0.5rem 1.25rem; background: var(--accent);
      color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.875rem;
      font-weight: 500;
    }
    .header .save-btn:hover { background: var(--accent-hover); }
    .header .save-status { font-size: 0.75rem; opacity: 0.7; margin-left: 0.75rem; }

    /* Report selector tabs */
    .tabs { background: #1e1e1c; padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; }
    .tab {
      font-family: 'Poppins', sans-serif; font-size: 0.75rem; font-weight: 500;
      padding: 0.6rem 1rem; cursor: pointer; color: #888; border-bottom: 2px solid transparent;
      white-space: nowrap; transition: color 0.15s;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Main layout */
    .main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }

    /* Summary bar */
    .summary-bar {
      display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.75rem 1.25rem; flex: 1; min-width: 140px;
    }
    .stat-label { font-family: 'Poppins', sans-serif; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.3rem; }
    .stat-value { font-size: 1.5rem; font-weight: 500; font-family: 'Poppins', sans-serif; }
    .stat-value.pass { color: var(--green); }
    .stat-value.fail { color: var(--red); }
    .stat-value.neutral { color: var(--text); }

    /* Compare delta bar */
    .compare-bar {
      display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .compare-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.75rem 1.25rem; flex: 1;
    }
    .compare-card h3 { font-family: 'Poppins', sans-serif; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; }
    .delta-positive { color: var(--green); }
    .delta-negative { color: var(--red); }

    /* Case list */
    .cases { display: flex; flex-direction: column; gap: 0.75rem; }

    .case-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .case-card.pass { border-left: 3px solid var(--green); }
    .case-card.fail { border-left: 3px solid var(--red); }
    .case-card.unscored { border-left: 3px solid var(--border); }

    .case-header {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
      cursor: pointer; user-select: none;
    }
    .case-header:hover { background: var(--bg); }

    .case-badge {
      font-family: 'Poppins', sans-serif; font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      padding: 0.2rem 0.5rem; border-radius: 3px; flex-shrink: 0;
    }
    .badge-pass { background: var(--green-bg); color: var(--green); }
    .badge-fail { background: var(--red-bg); color: var(--red); }
    .badge-skip { background: var(--border); color: var(--text-muted); }

    .case-id { font-family: 'Poppins', sans-serif; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
    .case-input-preview { font-size: 0.85rem; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .case-latency { font-family: 'Poppins', sans-serif; font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; }
    .case-chevron { color: var(--text-muted); font-size: 0.75rem; transition: transform 0.15s; flex-shrink: 0; }
    .case-card.expanded .case-chevron { transform: rotate(90deg); }

    .case-body { padding: 0 1rem 1rem; display: none; }
    .case-card.expanded .case-body { display: block; }

    .case-section { margin-bottom: 1rem; }
    .case-section-label {
      font-family: 'Poppins', sans-serif; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.4rem;
    }
    .case-text { font-size: 0.875rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .case-output {
      font-size: 0.875rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.75rem; max-height: 300px; overflow-y: auto;
    }

    /* Checks */
    .checks { display: flex; flex-direction: column; gap: 0.3rem; }
    .check-item {
      display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.8rem;
      padding: 0.35rem 0.6rem; border-radius: 4px;
    }
    .check-item.pass { background: var(--green-bg); color: #4a5e35; }
    .check-item.fail { background: var(--red-bg); color: #8b0000; }
    .check-icon { flex-shrink: 0; font-weight: 600; }
    .check-type { font-family: 'Poppins', sans-serif; font-size: 0.7rem; opacity: 0.7; margin-left: 0.25rem; }

    /* Feedback */
    .feedback-section { margin-top: 0.75rem; }
    .feedback-label { font-family: 'Poppins', sans-serif; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.4rem; }
    .feedback-textarea {
      width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius);
      font-family: 'Lora', Georgia, serif; font-size: 0.875rem; resize: vertical; min-height: 70px;
      background: var(--bg);
    }
    .feedback-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(217,119,87,0.15); }
    .feedback-saved { font-size: 0.75rem; color: var(--green); margin-top: 0.25rem; display: none; }

    /* Error state */
    .error-banner {
      background: var(--red-bg); border: 1px solid #e8aaaa; border-radius: var(--radius);
      padding: 0.75rem 1rem; font-size: 0.875rem; color: #8b0000; margin-bottom: 1rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 3rem; color: var(--text-muted);
      font-family: 'Poppins', sans-serif;
    }

    /* Compare case grid */
    .compare-cases { display: flex; flex-direction: column; gap: 0.75rem; }
    .compare-case-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .compare-case-header {
      padding: 0.75rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.75rem;
    }
    .compare-case-header:hover { background: var(--bg); }
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 0 1rem 1rem; }
    .compare-col h4 { font-family: 'Poppins', sans-serif; font-size: 0.8rem; margin-bottom: 0.5rem; }
    .win-badge { display: inline-block; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: var(--green-bg); color: var(--green); font-weight: 600; margin-left: 0.4rem; }

    /* Responsive */
    @media (max-width: 700px) {
      .header { padding: 0.75rem 1rem; }
      .main { padding: 1rem; }
      .tabs { padding: 0 1rem; }
      .compare-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1 id="header-title">Pi Evalset Viewer</h1>
    <div class="subtitle" id="header-subtitle"></div>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem">
    <span class="save-status" id="save-status"></span>
    <button class="save-btn" onclick="saveAllFeedback()">Save Feedback</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="main" id="main">
  <div class="empty-state">Loading...</div>
</div>

<script>
/*__EMBEDDED_DATA__*/

// ─── State ──────────────────────────────────────────────────────────────────
let currentIdx = 0;
const feedback = { ...(EMBEDDED_DATA.feedback || {}) };

// ─── Utilities ──────────────────────────────────────────────────────────────
function esc(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function fmtPct(v) {
  return v == null ? 'n/a' : `${(v * 100).toFixed(1)}%`;
}

function fmtMs(ms) {
  return ms >= 1000 ? `${(ms / 1000).toFixed(2)}s` : `${Math.round(ms)}ms`;
}

function fmtCost(c) {
  return `$${c.toFixed(4)}`;
}

function getBadge(c) {
  if (!c.scored) return `<span class="case-badge badge-skip">unscored</span>`;
  return c.pass
    ? `<span class="case-badge badge-pass">✓ pass</span>`
    : `<span class="case-badge badge-fail">✗ fail</span>`;
}

function getFeedbackKey(reportIdx, caseId) {
  const report = EMBEDDED_DATA.reports[reportIdx];
  if (!report) return '';
  return `${report.runId}::${caseId}`;
}

// ─── Render tabs ────────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = EMBEDDED_DATA.reports.map((r, i) => {
    const label = r.kind === 'compare'
      ? `compare: ${r.baseline.name} vs ${r.candidate.name}`
      : `run: ${r.variant || r.dataset}`;
    const ts = r.createdAt ? new Date(r.createdAt).toLocaleTimeString() : '';
    return `<div class="tab ${i === currentIdx ? 'active' : ''}" onclick="switchTab(${i})">${esc(label)}<br><span style="font-size:0.65rem;opacity:0.6">${ts}</span></div>`;
  }).join('');
}

function switchTab(idx) {
  currentIdx = idx;
  renderTabs();
  renderMain();
}

// ─── Render main ────────────────────────────────────────────────────────────
function renderMain() {
  const reports = EMBEDDED_DATA.reports;
  if (!reports || reports.length === 0) {
    document.getElementById('main').innerHTML = '<div class="empty-state">No reports found.</div>';
    return;
  }
  const r = reports[currentIdx];
  document.getElementById('header-title').textContent = `Pi Evalset Viewer — ${esc(EMBEDDED_DATA.skill_name)}`;
  document.getElementById('header-subtitle').textContent = `${r.dataset} · ${r.model}`;

  if (r.kind === 'compare') {
    renderCompare(r, currentIdx);
  } else {
    renderRun(r, currentIdx);
  }
}

// ─── Run view ───────────────────────────────────────────────────────────────
function renderRun(r, rIdx) {
  const passRate = r.passRate;
  const pctClass = passRate == null ? 'neutral' : (passRate >= 0.8 ? 'pass' : passRate >= 0.5 ? 'neutral' : 'fail');

  let html = `
    <div class="summary-bar">
      <div class="stat-card">
        <div class="stat-label">Pass Rate</div>
        <div class="stat-value ${pctClass}">${fmtPct(passRate)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Scored Cases</div>
        <div class="stat-value neutral">${r.passedCases}/${r.scoredCases}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Latency</div>
        <div class="stat-value neutral">${fmtMs(r.avgLatencyMs)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Cost</div>
        <div class="stat-value neutral">${fmtCost(r.totalCost)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Variant</div>
        <div class="stat-value neutral" style="font-size:1rem">${esc(r.variant || '—')}</div>
      </div>
    </div>
    <div class="cases">
  `;

  (r.cases || []).forEach((c, i) => {
    html += renderCaseCard(c, rIdx, i);
  });

  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

function renderCaseCard(c, rIdx, cIdx) {
  const key = getFeedbackKey(rIdx, c.id);
  const fb = feedback[key] || '';
  const cardClass = !c.scored ? 'unscored' : (c.pass ? 'pass' : 'fail');
  const checks = (c.checks || []).map(ch =>
    `<div class="check-item ${ch.pass ? 'pass' : 'fail'}">
      <span class="check-icon">${ch.pass ? '✓' : '✗'}</span>
      <span>${esc(ch.details)}</span>
      <span class="check-type">${esc(ch.check)}</span>
    </div>`
  ).join('');

  return `
    <div class="case-card ${cardClass}" id="case-${rIdx}-${cIdx}">
      <div class="case-header" onclick="toggleCase('case-${rIdx}-${cIdx}')">
        ${getBadge(c)}
        <span class="case-id">${esc(c.id || `case-${cIdx + 1}`)}</span>
        <span class="case-input-preview">${esc(c.input)}</span>
        <span class="case-latency">${fmtMs(c.latencyMs || 0)}</span>
        <span class="case-chevron">▶</span>
      </div>
      <div class="case-body">
        <div class="case-section">
          <div class="case-section-label">Input</div>
          <div class="case-text">${esc(c.input)}</div>
        </div>
        ${c.outputPreview ? `
        <div class="case-section">
          <div class="case-section-label">Output Preview</div>
          <div class="case-output">${esc(c.outputPreview)}</div>
        </div>` : ''}
        ${checks ? `
        <div class="case-section">
          <div class="case-section-label">Checks</div>
          <div class="checks">${checks}</div>
        </div>` : ''}
        ${c.error ? `
        <div class="error-banner">Error: ${esc(c.error)}</div>` : ''}
        <div class="feedback-section">
          <div class="feedback-label">Your Notes</div>
          <textarea class="feedback-textarea" placeholder="What do you think of this output? What should change?"
            oninput="updateFeedback('${rIdx}', '${cIdx}', '${esc(c.id || `case-${cIdx + 1}`)}', this.value)"
          >${esc(fb)}</textarea>
        </div>
      </div>
    </div>
  `;
}

// ─── Compare view ────────────────────────────────────────────────────────────
function renderCompare(r, rIdx) {
  const delta = r.delta || {};
  const deltaSign = delta.passRate > 0 ? '+' : '';
  const deltaClass = delta.passRate > 0 ? 'delta-positive' : delta.passRate < 0 ? 'delta-negative' : '';

  let html = `
    <div class="compare-bar">
      <div class="compare-card">
        <h3>${esc(r.baseline.name)} (baseline)</h3>
        <div>Pass rate: <strong>${fmtPct(r.baseline.passRate)}</strong> (${r.baseline.passedCases}/${r.baseline.scoredCases})</div>
        <div>Cost: ${fmtCost(r.baseline.totalCost)}</div>
      </div>
      <div class="compare-card">
        <h3>${esc(r.candidate.name)} (candidate)</h3>
        <div>Pass rate: <strong>${fmtPct(r.candidate.passRate)}</strong> (${r.candidate.passedCases}/${r.candidate.scoredCases})</div>
        <div>Cost: ${fmtCost(r.candidate.totalCost)}</div>
      </div>
      <div class="compare-card">
        <h3>Delta</h3>
        <div>Pass rate: <strong class="${deltaClass}">${deltaSign}${fmtPct(delta.passRate)}</strong></div>
        <div>Latency: ${delta.avgLatencyMs > 0 ? '+' : ''}${fmtMs(delta.avgLatencyMs)}</div>
        <div>Cost: ${delta.totalCost >= 0 ? '+' : ''}${fmtCost(delta.totalCost)}</div>
      </div>
    </div>
    <div class="compare-cases">
  `;

  // Match cases by id
  const baselineCases = r.baseline.cases || [];
  const candidateCases = r.candidate.cases || [];
  const caseIds = [...new Set([...baselineCases.map(c => c.id), ...candidateCases.map(c => c.id)])];

  caseIds.forEach((caseId, i) => {
    const bc = baselineCases.find(c => c.id === caseId);
    const cc = candidateCases.find(c => c.id === caseId);
    const key = getFeedbackKey(rIdx, caseId);
    const fb = feedback[key] || '';
    const input = bc?.input || cc?.input || '';

    // Determine winner
    let winner = null;
    if (bc && cc && bc.scored && cc.scored) {
      if (bc.pass && !cc.pass) winner = 'baseline';
      else if (!bc.pass && cc.pass) winner = 'candidate';
    }

    html += `
      <div class="compare-case-card" id="ccase-${rIdx}-${i}">
        <div class="compare-case-header" onclick="toggleCase('ccase-${rIdx}-${i}')">
          ${bc ? getBadge(bc) : ''}
          <span style="font-size:0.7rem;color:var(--text-muted);margin:0 0.25rem">→</span>
          ${cc ? getBadge(cc) : ''}
          <span class="case-id" style="margin-left:0.5rem">${esc(caseId)}</span>
          <span class="case-input-preview">${esc(input)}</span>
          <span class="case-chevron">▶</span>
        </div>
        <div class="case-body">
          <div class="compare-grid">
            <div class="compare-col">
              <h4>${esc(r.baseline.name)}${winner === 'baseline' ? '<span class="win-badge">winner</span>' : ''}</h4>
              ${bc ? renderCaseDetail(bc) : '<em>No data</em>'}
            </div>
            <div class="compare-col">
              <h4>${esc(r.candidate.name)}${winner === 'candidate' ? '<span class="win-badge">winner</span>' : ''}</h4>
              ${cc ? renderCaseDetail(cc) : '<em>No data</em>'}
            </div>
          </div>
          <div class="feedback-section">
            <div class="feedback-label">Your Notes</div>
            <textarea class="feedback-textarea" placeholder="Which variant is better and why?"
              oninput="updateFeedback('${rIdx}', '${i}', '${esc(caseId)}', this.value)"
            >${esc(fb)}</textarea>
          </div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

function renderCaseDetail(c) {
  const checks = (c.checks || []).map(ch =>
    `<div class="check-item ${ch.pass ? 'pass' : 'fail'}">
      <span class="check-icon">${ch.pass ? '✓' : '✗'}</span>
      <span>${esc(ch.details)}</span>
    </div>`
  ).join('');
  return `
    ${c.outputPreview ? `<div class="case-output" style="max-height:200px">${esc(c.outputPreview)}</div>` : ''}
    ${checks ? `<div class="checks" style="margin-top:0.5rem">${checks}</div>` : ''}
    ${c.error ? `<div class="error-banner" style="margin-top:0.5rem">Error: ${esc(c.error)}</div>` : ''}
  `;
}

// ─── Interactions ────────────────────────────────────────────────────────────
function toggleCase(id) {
  document.getElementById(id)?.classList.toggle('expanded');
}

function updateFeedback(rIdx, cIdx, caseId, value) {
  const key = getFeedbackKey(parseInt(rIdx), caseId);
  if (value.trim()) {
    feedback[key] = value;
  } else {
    delete feedback[key];
  }
}

async function saveAllFeedback() {
  const reviews = Object.entries(feedback).map(([run_id, fb]) => ({ run_id, feedback: fb }));
  const status = document.getElementById('save-status');
  try {
    const resp = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reviews }),
    });
    if (resp.ok) {
      status.textContent = '✓ Saved';
      status.style.color = 'var(--green)';
    } else {
      throw new Error(await resp.text());
    }
  } catch (err) {
    // Static mode: download instead
    const blob = new Blob([JSON.stringify({ reviews }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'feedback.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    status.textContent = '↓ Downloaded';
    status.style.color = 'var(--accent)';
  }
  setTimeout(() => { status.textContent = ''; }, 3000);
}

// ─── Init ────────────────────────────────────────────────────────────────────
renderTabs();
renderMain();
</script>
</body>
</html>
